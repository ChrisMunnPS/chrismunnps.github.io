<!DOCTYPE html>
<html>
<head>
  <title>Migraine Analytics Dashboard</title>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h1>Migraine Analytics Dashboard</h1>

<input id="sheet" placeholder="Paste Google Sheet URL" style="width:350px;">
<button onclick="loadData()">Load Data</button>

<h2>Risk Score: <span id="risk">-</span>%</h2>

<h3>Severity Over Time</h3>
<canvas id="timeline" width="600" height="300"></canvas>

<h3>Correlation with Severity</h3>
<canvas id="corr" width="600" height="300"></canvas>

<script>
let timelineChart, corrChart;

// ✅ Improved CSV parser
function parseCSV(text) {
  const rows = text.trim().split("\\n");

  const headers = rows[0].split(",");

  return rows.slice(1).map(row => {
    const values = row.match(/(".*?"|[^",\\s]+)(?=,|$)/g);

    if (!values) return null;

    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = values[i]?.replace(/"/g, "") || "";
    });

    return obj;
  }).filter(r => r !== null);
}

// ✅ Correlation function
function correlation(x, y) {
  const n = x.length;
  const avgX = x.reduce((a,b)=>a+b,0)/n;
  const avgY = y.reduce((a,b)=>a+b,0)/n;

  let num=0, dx=0, dy=0;
  for (let i=0;i<n;i++) {
    num += (x[i]-avgX)*(y[i]-avgY);
    dx += (x[i]-avgX)**2;
    dy += (y[i]-avgY)**2;
  }
  return num / Math.sqrt(dx*dy || 1);
}

// ✅ Load data from Google Sheets
async function loadData() {
  try {
    const input = document.getElementById("sheet").value;

    const idMatch = input.match(/\/d\/(.*?)\//);
    const gidMatch = input.match(/gid=(\d+)/);

    if (!idMatch) {
      alert("Invalid Google Sheets URL");
      return;
    }

    const id = idMatch[1];
    const gid = gidMatch ? gidMatch[1] : "0";

    const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;

    console.log("Fetching:", csvUrl);

    const res = await fetch(csvUrl);

    if (!res.ok) {
      throw new Error("Network error");
    }

    const text = await res.text();

    console.log("CSV preview:", text.substring(0, 200));

    const data = parseCSV(text);

    console.log("Parsed rows:", data.length);

    if (data.length === 0) {
      alert("No data found");
      return;
    }

    processData(data);

  } catch (e) {
    console.error(e);
    alert("Error: " + e.message);
  }
}

// ✅ Process your migraine data
function processData(data) {
  const severity = data.map(r => Number(r["Severity"]) || 0);
  const labels = data.map(r => r["Date"]);

  drawTimeline(labels, severity);

  const metrics = [
    "Pressure Change (Δ)",
    "Humidity (%)",
    "Temperature (°C)",
    "Temp Change (Δ)",
    "Sleep Duration (hrs)",
    "Sleep Efficiency (%)",
    "Awake Time (mins)",
    "REM Duration (mins)",
    "Deep Sleep (mins)",
    "Avg HR (bpm)",
    "HRV"
  ];

  const corrValues = metrics.map(m => {
    const values = data.map(r => Number(r[m]) || 0);
    return Number(correlation(values, severity).toFixed(2));
  });

  drawCorrelation(metrics, corrValues);

  // ✅ Risk score
  const latest = data[data.length - 1];
  let risk = 0;

  if ((Number(latest["Sleep Duration (hrs)"]) || 0) < 6) risk++;
  if ((Number(latest["Sleep Efficiency (%)"]) || 0) < 80) risk++;
  if ((Number(latest["HRV"]) || 0) < 40) risk++;
  if (Math.abs(Number(latest["Pressure Change (Δ)"]) || 0) > 5) risk++;

  document.getElementById("risk").textContent =
    Math.round((risk / 4) * 100);
}

// ✅ Draw timeline chart
function drawTimeline(labels, data) {
  if (timelineChart) timelineChart.destroy();

  timelineChart = new Chart(document.getElementById("timeline"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Severity",
        data: data,
        borderColor: "red",
        fill: false
      }]
    }
  });
}

// ✅ Draw correlation chart
function drawCorrelation(labels, data) {
  if (corrChart) corrChart.destroy();

  corrChart = new Chart(document.getElementById("corr"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Correlation",
        data: data,
        backgroundColor: "blue"
      }]
    }
  });
}
</script>

</body>
</html>
